name: Documentation issue
description: Wrong, missing, or confusing documentation.
labels: ["docs", "triage"]
body:
  - type: input
    id: page
    attributes:
      label: Affected page or file
      placeholder: "docs/tutorials/01-iso27001-nis2-from-ansible.md / README.md"
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What is wrong, missing, or confusing?
    validations:
      required: true

  - type: textarea
    id: suggested
    attributes:
      label: Suggested fix (optional)
      description: PRs welcome — see CONTRIBUTING.md.
