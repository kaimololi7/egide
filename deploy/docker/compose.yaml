# Egide — local development environment
# Brings up: PostgreSQL 17 + pgvector + ClickHouse + Redis + NATS JetStream + Ollama
#
# Run:
#   docker compose -f deploy/docker/compose.yaml up -d
#
# All services bind to 127.0.0.1 — no external exposure.
# Ollama is profile-gated (`docker compose --profile ai up`) since it's heavy.
#
# Production deployment uses Helm (deploy/helm/), not this compose file.

name: egide-dev

services:
  # ──────────────────────────────────────────────────────────
  # PostgreSQL 17 with pgvector extension (cf. ADR 006 + 007)
  # ──────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: egide-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: egide
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d egide"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - log_statement=none
      - -c
      - log_min_duration_statement=200ms
      - -c
      - shared_preload_libraries=pg_stat_statements

  # ──────────────────────────────────────────────────────────
  # ClickHouse — audit trail + telemetry (cf. ADR architecture)
  # ──────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: egide-clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"   # HTTP
      - "127.0.0.1:9000:9000"   # native
    environment:
      CLICKHOUSE_DB: egide
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Redis — LLM cache, sessions, idempotency keys
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: egide-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - "allkeys-lru"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # NATS JetStream — message bus (cf. ADR 008, from M1)
  # ──────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: egide-nats
    restart: unless-stopped
    ports:
      - "127.0.0.1:4222:4222"   # client
      - "127.0.0.1:8222:8222"   # monitoring HTTP
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
      - "--name"
      - "egide-nats"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # MinIO — S3-compatible evidence blobs (sovereign-friendly)
  # ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: egide-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9000"   # S3 API (mapped to avoid clash with ClickHouse 9000)
      - "127.0.0.1:9091:9001"   # web console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniominio
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Ollama — local LLM (profile-gated, heavy)
  # ──────────────────────────────────────────────────────────
  # Run: docker compose --profile ai up -d
  ollama:
    image: ollama/ollama:0.4.0
    container_name: egide-ollama
    restart: unless-stopped
    profiles: ["ai"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "5m"

  # ──────────────────────────────────────────────────────────
  # OpenTelemetry Collector — observability (cf. ADR 015)
  # ──────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: egide-otel
    restart: unless-stopped
    profiles: ["obs"]
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "127.0.0.1:13133:13133" # health
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 10s

volumes:
  postgres-data:
  clickhouse-data:
  redis-data:
  nats-data:
  minio-data:
  ollama-data:

networks:
  default:
    name: egide-dev
    driver: bridge
