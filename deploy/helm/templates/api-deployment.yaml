{{- if .Values.api.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "egide.fullname" . }}-api
  labels: {{- include "egide.componentLabels" (merge (dict "component" "api") .) | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels: {{- include "egide.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels: {{- include "egide.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "egide.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "egide.image" (merge (dict "repository" .Values.api.image.repository "tag" .Values.api.image.tag) .) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
          envFrom:
            - secretRef:
                name: {{ include "egide.fullname" . }}-config
          {{- with .Values.api.env }}
          env: {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "egide.fullname" . }}-api
  labels: {{- include "egide.componentLabels" (merge (dict "component" "api") .) | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector: {{- include "egide.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - { name: http, port: {{ .Values.api.service.port }}, targetPort: http }
{{- end }}
