{{/*
Better-Auth + LLM keys + DB connection — assembled into a single Secret
mounted by the api Deployment. Per ADR 014, secrets never appear in
configmaps or env vars in plaintext.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "egide.fullname" . }}-config
  labels: {{- include "egide.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ .Values.auth.secret | quote }}
  BETTER_AUTH_URL: {{ .Values.auth.baseUrl | quote }}
  {{- if .Values.external.postgresUrl }}
  POSTGRES_URL: {{ .Values.external.postgresUrl | quote }}
  {{- end }}
  {{- if .Values.external.postgresAdminUrl }}
  PG_ADMIN_URL: {{ .Values.external.postgresAdminUrl | quote }}
  {{- end }}
  {{- if .Values.external.redisUrl }}
  REDIS_URL: {{ .Values.external.redisUrl | quote }}
  {{- end }}
  {{- if .Values.external.natsUrl }}
  NATS_URL: {{ .Values.external.natsUrl | quote }}
  {{- end }}
  {{- with .Values.llm }}
  {{- if .anthropicApiKey }}ANTHROPIC_API_KEY: {{ .anthropicApiKey | quote }}{{- end }}
  {{- if .mistralApiKey }}MISTRAL_API_KEY: {{ .mistralApiKey | quote }}{{- end }}
  {{- if .scalewayAiKey }}SCALEWAY_AI_KEY: {{ .scalewayAiKey | quote }}{{- end }}
  {{- if .ovhAiKey }}OVH_AI_KEY: {{ .ovhAiKey | quote }}{{- end }}
  LLM_LOCAL_URL: {{ .localUrl | quote }}
  LLM_LOCAL_MODEL: {{ .localModel | quote }}
  {{- end }}
  EGIDE_EDITION: {{ .Values.global.edition | quote }}
  LOG_LEVEL: {{ .Values.observability.logLevel | quote }}
