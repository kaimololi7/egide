# OSV-Scanner configuration — Egide v0.1.0
#
# Vulnerabilities listed below are dev-time / build-chain only (esbuild,
# postcss, vite are pulled transitively by Next.js dev server and are
# never present in production runtime images, which use bun build output
# served from a hardened distroless base — see deploy/docker/).
#
# Runtime vulnerabilities are caught by trivy-fs + trivy-image jobs in CI
# (cf. ADR 016). These ignores are scoped to the lockfile-only deps-scan
# job and must be reviewed at every minor release.
#
# Schema: https://google.github.io/osv-scanner/configuration/

