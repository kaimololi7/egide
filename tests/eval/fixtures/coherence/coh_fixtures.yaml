# Coherence fixtures — 15 pyramid graphs with expected validation results.
#
# Tests the validator's 25 deterministic rules against known-good and
# known-bad pyramid structures.
#
# Format:
#   id:               unique fixture ID
#   description:      what this fixture tests
#   graph:            list of pyramid nodes (id, parent_id, layer, title, ...)
#   expected_valid:   true if graph should pass all rules, false if violations expected
#   expected_rule_ids: list of rule IDs expected to fire (when expected_valid=false)

fixtures:

  # ── VALID graphs ─────────────────────────────────────────────────────────

  - id: coh-001
    description: "Minimal valid pyramid — one node per layer, all linked"
    expected_valid: true
    expected_rule_ids: []
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Information Security Policy"
        status: published
        version: "1.0"
        framework_refs: ["iso27001-2022:A.5.2"]
      - id: "p1"
        parent_id: "d1"
        layer: policy
        title: "Access Control Policy"
        status: published
        version: "1.0"
        framework_refs: ["iso27001-2022:A.8.2"]
      - id: "pr1"
        parent_id: "p1"
        layer: procedure
        title: "User Access Provisioning Procedure"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "proc1"
        parent_id: "pr1"
        layer: process
        title: "IAM Onboarding Process"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "k1"
        parent_id: "proc1"
        layer: kpi
        title: "Access Review Completion Rate"
        status: published
        version: "1.0"
        framework_refs: []

  - id: coh-002
    description: "Valid pyramid with multiple policies under one directive"
    expected_valid: true
    expected_rule_ids: []
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Data Protection Directive"
        status: published
        version: "1.0"
        framework_refs: ["iso27001-2022:A.5.12"]
      - id: "p1"
        parent_id: "d1"
        layer: policy
        title: "Encryption Policy"
        status: published
        version: "1.0"
        framework_refs: ["iso27001-2022:A.8.24"]
      - id: "p2"
        parent_id: "d1"
        layer: policy
        title: "Data Classification Policy"
        status: published
        version: "1.0"
        framework_refs: ["iso27001-2022:A.5.12"]
      - id: "pr1"
        parent_id: "p1"
        layer: procedure
        title: "Key Management Procedure"
        status: published
        version: "1.0"
        framework_refs: []

  - id: coh-003
    description: "Valid — draft nodes are allowed below published directive"
    expected_valid: true
    expected_rule_ids: []
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Security Directive"
        status: published
        version: "1.0"
        framework_refs: ["iso27001-2022:A.5.1"]
      - id: "p1"
        parent_id: "d1"
        layer: policy
        title: "Patch Management Policy"
        status: draft
        version: "0.1"
        framework_refs: []

  # ── INVALID — layer order violations ─────────────────────────────────────

  - id: coh-004
    description: "Violation — policy has no parent (orphan policy)"
    expected_valid: false
    expected_rule_ids: ["R-003"]
    graph:
      - id: "p1"
        parent_id: null
        layer: policy
        title: "Orphan Access Policy"
        status: published
        version: "1.0"
        framework_refs: []

  - id: coh-005
    description: "Violation — procedure directly under directive (skip policy layer)"
    expected_valid: false
    expected_rule_ids: ["R-004"]
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Security Directive"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "pr1"
        parent_id: "d1"
        layer: procedure
        title: "Procedure under Directive — invalid"
        status: published
        version: "1.0"
        framework_refs: []

  - id: coh-006
    description: "Violation — KPI directly under policy (skip procedure + process)"
    expected_valid: false
    expected_rule_ids: ["R-006"]
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Directive"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "p1"
        parent_id: "d1"
        layer: policy
        title: "Policy"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "k1"
        parent_id: "p1"
        layer: kpi
        title: "KPI under Policy — invalid"
        status: published
        version: "1.0"
        framework_refs: []

  # ── INVALID — directive constraints ──────────────────────────────────────

  - id: coh-007
    description: "Violation — directive has a parent (directives must be root)"
    expected_valid: false
    expected_rule_ids: ["R-001"]
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Root Directive"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "d2"
        parent_id: "d1"
        layer: directive
        title: "Child Directive — invalid"
        status: published
        version: "1.0"
        framework_refs: []

  - id: coh-008
    description: "Violation — empty title on a policy node"
    expected_valid: false
    expected_rule_ids: ["R-010"]
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Security Directive"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "p1"
        parent_id: "d1"
        layer: policy
        title: ""
        status: published
        version: "1.0"
        framework_refs: []

  - id: coh-009
    description: "Violation — circular reference (process points back to directive)"
    expected_valid: false
    expected_rule_ids: ["R-020"]
    graph:
      - id: "d1"
        parent_id: "proc1"
        layer: directive
        title: "Directive in cycle"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "proc1"
        parent_id: "d1"
        layer: process
        title: "Process in cycle"
        status: published
        version: "1.0"
        framework_refs: []

  # ── INVALID — version + status ────────────────────────────────────────────

  - id: coh-010
    description: "Violation — published node with version 0.x (must be >= 1.0)"
    expected_valid: false
    expected_rule_ids: ["R-015"]
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Premature Published Directive"
        status: published
        version: "0.9"
        framework_refs: []

  - id: coh-011
    description: "Warning (not error) — procedure without framework_refs under anchored policy"
    expected_valid: true
    expected_rule_ids: []
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Security Directive"
        status: published
        version: "1.0"
        framework_refs: ["iso27001-2022:A.5.1"]
      - id: "p1"
        parent_id: "d1"
        layer: policy
        title: "Access Policy"
        status: published
        version: "1.0"
        framework_refs: ["iso27001-2022:A.8.3"]
      - id: "pr1"
        parent_id: "p1"
        layer: procedure
        title: "Procedure with no anchors below anchored policy"
        status: published
        version: "1.0"
        framework_refs: []

  # ── INVALID — multiple violations ─────────────────────────────────────────

  - id: coh-012
    description: "Multiple violations — orphan policy + empty title"
    expected_valid: false
    expected_rule_ids: ["R-003", "R-010"]
    graph:
      - id: "p1"
        parent_id: null
        layer: policy
        title: ""
        status: draft
        version: "0.1"
        framework_refs: []

  - id: coh-013
    description: "Violation — duplicate node IDs in graph"
    expected_valid: false
    expected_rule_ids: ["R-021"]
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Directive A"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Directive B — duplicate ID"
        status: published
        version: "1.0"
        framework_refs: []

  - id: coh-014
    description: "Valid — KPI under process (correct full chain)"
    expected_valid: true
    expected_rule_ids: []
    graph:
      - id: "d1"
        parent_id: null
        layer: directive
        title: "Risk Management Directive"
        status: published
        version: "1.0"
        framework_refs: ["iso27001-2022:A.6.1"]
      - id: "p1"
        parent_id: "d1"
        layer: policy
        title: "Risk Management Policy"
        status: published
        version: "1.0"
        framework_refs: ["iso27001-2022:A.6.1"]
      - id: "pr1"
        parent_id: "p1"
        layer: procedure
        title: "Risk Assessment Procedure"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "proc1"
        parent_id: "pr1"
        layer: process
        title: "Risk Register Update Process"
        status: published
        version: "1.0"
        framework_refs: []
      - id: "k1"
        parent_id: "proc1"
        layer: kpi
        title: "Risk Coverage KPI"
        status: published
        version: "1.0"
        framework_refs: []

  - id: coh-015
    description: "Violation — KPI with no parent"
    expected_valid: false
    expected_rule_ids: ["R-007"]
    graph:
      - id: "k1"
        parent_id: null
        layer: kpi
        title: "Orphan KPI"
        status: draft
        version: "0.1"
        framework_refs: []
